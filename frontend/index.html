<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Package</title>
    <meta
      name="description"
      content="Prompt Package — turn your OpenRouter chats into reusable project memory: chat, summarize, search, and generate Context Packs you can paste into the next AI session."
    />
    <meta name="theme-color" content="#1a73e8" />
    <!-- Fonts come from the operating system. We used to pull Roboto
         from Google Fonts, but Chrome's Private Network Access rules
         block cross-origin fetches from HTTP pages served on a LAN-ish
         IP (like our bare ECS IP), which would leave the UI unstyled.
         The system stack gives us the same visual feel everywhere:
         SF Pro on Apple, Segoe UI on Windows, Roboto on Android,
         Ubuntu on Linux desktops. -->
    <style>
      /* Inline boot splash so the first paint isn't a blank white square. */
      #app:empty::before {
        content: '';
        position: fixed;
        inset: 50% auto auto 50%;
        width: 28px;
        height: 28px;
        margin: -14px 0 0 -14px;
        border-radius: 50%;
        border: 3px solid #e5e7eb;
        border-top-color: #1a73e8;
        animation: promptpackage-boot-spin 0.8s linear infinite;
      }
      @keyframes promptpackage-boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
